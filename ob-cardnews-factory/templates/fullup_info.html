<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1" />
  <style>{{{css}}}</style>
</head>
<body>
  <section class="card {{card_class}}">
    <div class="shape shape-a"></div>
    <div class="shape shape-b"></div>
    <div class="grain"></div>
    <header class="topbar">
      <div>
        <div class="brand">FULL-UP</div>
        <div class="topic">{{topic}}</div>
      </div>
      <div class="series">CARD NEWS</div>
    </header>
    <main class="main">
      <div class="badge">{{type_label}}</div>
      <h1>{{headline}}</h1>
      <p>{{body}}</p>
    </main>
    <footer class="footer">
      <div class="small">두피도 피부처럼 관리하세요.<br/>과장 없는 두피 케어 정보</div>
      <div class="progress">
        <span>{{card_no}}</span>
        <i></i>
        <span>{{card_count}}</span>
      </div>
    </footer>
  </section>
</body>
</html>
